name: Auto-Merge Clean PRs

on:
  pull_request:
    types: [labeled, synchronize]
  workflow_run:
    workflows: ["PR Auto-Review & Score"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-and-merge:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get the PR number
            let prNum;
            if (context.payload.pull_request) {
              prNum = context.payload.pull_request.number;
            } else if (context.payload.workflow_run) {
              // Extract from workflow_run payload
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner, repo,
                run_id: context.payload.workflow_run.id
              });
              // Get the PRs associated with this run
              const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
                owner, repo,
                run_id: context.payload.workflow_run.id
              });
              // We need to find the PR number from the workflow run
              const { data: prs } = await github.rest.pulls.list({
                owner, repo, state: "open", sort: "updated", direction: "desc", per_page: 5
              });
              // Find a PR that has the auto-reviewed label and was recently updated
              for (const pr of prs) {
                const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                  issue_number: pr.number, owner, repo
                });
                if (labels.some(l => l.name === "auto-reviewed")) {
                  prNum = pr.number;
                  break;
                }
              }
            }

            if (!prNum) {
              console.log("No PR to merge");
              return;
            }

            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNum
            });

            // Skip if already merged or closed
            if (pr.merged || pr.state === "closed") {
              console.log(`PR #${prNum}: already merged/closed`);
              return;
            }

            // Skip admin PRs
            if (pr.user.login === owner) {
              console.log(`PR #${prNum}: admin PR, skipping auto-merge`);
              return;
            }

            // Check labels
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              issue_number: prNum, owner, repo
            });
            const labelNames = labels.map(l => l.name);

            const hasCheat = labelNames.includes("cheat-detected");
            const hasApproved = labelNames.includes("approved");
            const hasAutoReviewed = labelNames.includes("auto-reviewed");

            if (!hasAutoReviewed) {
              console.log(`PR #${prNum}: not yet reviewed`);
              return;
            }

            if (hasCheat) {
              console.log(`PR #${prNum}: cheat detected, blocking merge`);
              await github.rest.issues.createComment({
                issue_number: prNum, owner, repo,
                body: `⛔ 自动合并已拒绝：检测到作弊标记，需要人工审核。`
              });
              await github.rest.issues.addLabels({
                issue_number: prNum, owner, repo,
                labels: ["blocked"]
              });
              return;
            }

            if (!hasApproved) {
              console.log(`PR #${prNum}: approved label missing`);
              return;
            }

            // Check status checks
            const { data: checks } = await github.rest.checks.listForRef({
              owner, repo, ref: pr.head.sha
            });

            const failedChecks = checks.check_runs.filter(c => c.conclusion === "failure");
            if (failedChecks.length > 0) {
              console.log(`PR #${prNum}: ${failedChecks.length} check(s) failed`);
              await github.rest.issues.createComment({
                issue_number: prNum, owner, repo,
                body: `⏳ 等待所有检查通过... (${failedChecks.length} 个检查失败)`
              });
              return;
            }

            // All checks passed - try to merge
            let qualityBadge = "";
            try {
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: prNum, owner, repo
              });
              const reviewComment = comments.find(c => c.body.includes("综合评分"));
              if (reviewComment) {
                const scoreMatch = reviewComment.body.match(/综合评分\**:\s*\*+(\d+)/);
                if (scoreMatch) {
                  const cs = parseInt(scoreMatch[1]);
                  if (cs >= 90) qualityBadge = "🏆 优秀提交 (评分 " + cs + "/100)\n";
                  else if (cs >= 75) qualityBadge = "✅ 良好提交 (评分 " + cs + "/100)\n";
                }
              }
            } catch (e) {}

            await github.rest.pulls.merge({
              owner, repo, pull_number: prNum,
              merge_method: "squash",
              commit_title: `fix: ${pr.title} (auto-merged #${prNum})`,
              commit_message: `Auto-merged by AI Training Bot.\n${qualityBadge}✅ Score passed\n🔍 No cheating detected\n\n> 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。感谢贡献！🎉``
            });
            console.log(`PR #${prNum}: MERGED successfully!`);
            } catch (e) {
              // Merge conflict - need rebase
              if (e.message && e.message.includes("merge conflict")) {
                console.log(`PR #${prNum}: merge conflict, requesting rebase`);
                await github.rest.issues.createComment({
                  issue_number: prNum, owner, repo,
                  body: `🔄 合并冲突，请 rebase 到最新 master。`
                });
              } else {
                console.log(`PR #${prNum}: merge failed: ${e.message}`);
              }
            }
