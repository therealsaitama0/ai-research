name: Achievements

on:
  workflow_dispatch:
    inputs:
      user:
        description: "检查指定用户的成就"
        required: false
  schedule:
    - cron: "0 10 * * 0"   # 每周日 UTC 10:00

permissions:
  issues: write
  contents: read

jobs:
  achievements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fs = require("fs");

            // Read ledger
            let ledger = {};
            try {
              const { data: f } = await github.rest.repos.getContent({ owner, repo, path: "BOUNTY_LEDGER.json" });
              ledger = JSON.parse(Buffer.from(f.content, "base64").toString());
            } catch (e) { console.log("No ledger"); }

            // Read time ledger
            let tledger = {};
            try {
              const { data: f } = await github.rest.repos.getContent({ owner, repo, path: "TIME_LEDGER.json" });
              tledger = JSON.parse(Buffer.from(f.content, "base64").toString());
            } catch (e) {}

            const targetUser = "${{ github.event.inputs.user }}".trim();

            const achievements = [];
            for (const [user, data] of Object.entries(ledger)) {
              if (targetUser && user !== targetUser) continue;

              const submissions = data.submissions || [];
              const count = submissions.length || data.task_count || 0;
              // Use task_count from legacy or count from submissions

              // Milestone achievements
              const milestones = [1, 5, 10, 25, 50, 100];
              for (const m of milestones) {
                if (count >= m) {
                  achievements.push({ user, type: "milestone", level: m,
                    msg: `🎉 @${user} 完成了 **${m}** 个任务！` });
                }
              }

              // Score achievements
              if (data.total >= 1000) achievements.push({ user, type: "score", level: 1000,
                msg: `💰 @${user} 累计收入突破 **$1,000**！` });
              if (data.total >= 5000) achievements.push({ user, type: "score", level: 5000,
                msg: `💰 @${user} 累计收入突破 **$5,000**！` });
            }

            // Time-based achievements
            for (const [user, data] of Object.entries(tledger)) {
              if (targetUser && user !== targetUser) continue;
              const tasks = data.tasks || [];
              const fastest = Math.min(...tasks.map(t => t.elapsedSec || Infinity));
              if (fastest < 300) { // < 5 min
                achievements.push({ user, type: "speed", level: "fast",
                  msg: `⚡ @${user} 创下最快修复记录 (${Math.floor(fastest/60)}m ${fastest%60}s)！` });
              }
            }

            // Create achievement report
            if (achievements.length === 0) {
              console.log("No new achievements");
              return;
            }

            // Deduplicate by message
            const seen = new Set();
            const unique = achievements.filter(a => {
              const key = a.msg;
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });

            let report = "## 🏅 成就解锁\n\n";
            for (const a of unique) {
              report += `- ${a.msg}\n`;
            }
            report += "\n---\n> 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。继续加油！🚀\n";

            // Check achievement log to avoid duplicates
            let history = [];
            try {
              const { data: hist } = await github.rest.repos.getContent({ owner, repo, path: "ACHIEVEMENTS_LOG.md" });
              history = Buffer.from(hist.content, "base64").toString().split("\n");
            } catch (e) {}

            const newOnes = unique.filter(a => !history.some(h => h.includes(a.msg.slice(0, 30))));

            if (newOnes.length === 0) {
              console.log("All achievements already recorded");
              return;
            }

            // Create achievement issue
            const issueBody = "## 🏅 新成就解锁！\n\n" + newOnes.map(a => "- " + a.msg).join("\n") +
              "\n\n---\n> 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。继续加油！🚀\n";

            await github.rest.issues.create({
              owner, repo,
              title: `🏅 新成就！${newOnes[0].msg.slice(0, 40)}...`,
              body: issueBody,
              labels: ["achievement"]
            });

            // Append to log
            const logEntry = newOnes.map(a => `- ${a.msg} (${new Date().toISOString().slice(0, 10)})`).join("\n");
            fs.appendFileSync("ACHIEVEMENTS_LOG.md", logEntry + "\n");

            console.log(`${newOnes.length} new achievement(s) posted`);
