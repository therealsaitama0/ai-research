name: Review New Issue Submissions

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write

jobs:
  review:
    if: github.actor != github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Evaluate Issue Code
        id: eval
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const body = issue.body || "";
            const issueNum = issue.number;
            const title = issue.title;

            // Skip non-code issues (feature requests, questions, etc.)
            const codeMatch = body.match(/```(?:python|javascript|py|js|java|go|rust|cpp|c\+\+|csharp|ruby|php|bash|sh|sql|html|xml|json|yaml|toml|typescript|ts|solidity)?\s*\n([\s\S]*?)```/);
            if (!codeMatch) {
              console.log("No code block in issue body, skipping");
              core.setFailed("No code");
              return;
            }
            const code = codeMatch[1];

            // Load shared cheat-detect engine
            const { data: detectScript } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo,
              path: ".github/scripts/cheat-detect.js"
            });
            eval(Buffer.from(detectScript.content, "base64").toString());

            // --- Cheat Detection (shared engine) ---
            // Try to determine target bug issue from title/body
            const bugMatch = (title + " " + body).match(/(?:fix|close|resolve|#)\s*(\d+)/i);
            const targetIssue = bugMatch ? bugMatch[1] : null;

            const labels = issue.labels.map(l => l.name.toLowerCase());
            const result = cheatDetect.evaluate(code, { labels });
            const clean = result.clean;
            const total = result.score;
            const baseScore = result.baseScore;
            const findings = result.findings;
            // Score
            const labels = issue.labels.map(l => l.name.toLowerCase());
            let diff = "medium";
            for (const d of ["easy","medium","hard","expert"]) {
              if (labels.includes(d)) { diff = d; break; }
            }
            const baseScore = {easy:50, medium:75, hard:100, expert:150}[diff] || 75;
            const suspicion = findings.length === 0 ? 0 : Math.min(Math.max(...findings.map(f => f.conf)), 1);
            const deduction = Math.floor(suspicion * 100);
            const total = Math.max(baseScore - deduction, 0);
            const clean = findings.length === 0;

            // Build report
            let report = `## 🔍 自动审查\n\n**提交者**: @${author}\n`;
            if (targetIssue) report += `**目标漏洞**: #${targetIssue}\n`;
            report += `**难度**: ${diff}\n\n`;

            if (clean) {
              report += `### ✅ 审查通过\n\n未检测到可疑模式。\n\n`;
            } else {
              report += `### ⚠️ 检测到可疑模式\n\n| 嫌疑项 | 置信度 | 说明 |\n|:------:|:------:|:----:|\n`;
              for (const f of findings) {
                report += `| ${f.name} | ${Math.floor(f.conf*100)}% | ${f.desc} |\n`;
              }
              report += "\n";
            }

            report += `**最终得分

> 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。感谢您的贡献！🚀**: ${total}/${baseScore}\n`;

            // Post evaluation
            await github.rest.issues.createComment({
              issue_number: issueNum,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

            // Add labels
            const newLabels = ["auto-reviewed"];
            if (clean) newLabels.push("approved");
            else newLabels.push("cheat-detected");
            await github.rest.issues.addLabels({
              issue_number: issueNum,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: newLabels
            });

            // Save to BOUNTY_LEDGER
            const fs = require("fs");
            let ledger = {};
            if (fs.existsSync("BOUNTY_LEDGER.json")) {
              ledger = JSON.parse(fs.readFileSync("BOUNTY_LEDGER.json", "utf-8"));
            }
            if (!ledger[author]) ledger[author] = {total: 0, submissions: []};
            ledger[author].total += total;
            ledger[author].submissions.push({
              issue: issueNum,
              targetIssue: targetIssue || "N/A",
              score: total,
              clean: clean,
              difficulty: diff,
              date: new Date().toISOString()
            });
            fs.writeFileSync("BOUNTY_LEDGER.json", JSON.stringify(ledger, null, 2));
            // Save time to TIME_LEDGER
            let tledger = {};
            if (fs.existsSync("TIME_LEDGER.json")) {
              tledger = JSON.parse(fs.readFileSync("TIME_LEDGER.json", "utf-8"));
            }
            if (!tledger[author]) tledger[author] = {totalSec: 0, tasks: []};
            tledger[author].totalSec += elapsedSec;
            tledger[author].tasks.push({issue: issueNum, elapsedSec, date: new Date().toISOString()});
            fs.writeFileSync("TIME_LEDGER.json", JSON.stringify(tledger, null, 2));


            // Calculate time for time leaderboard
            if (targetIssue) {
              try {
                const { data: bugIssue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(targetIssue)
                });
                const created = new Date(bugIssue.created_at);
                const submitted = new Date(issue.created_at);
                const elapsedSec = Math.floor((submitted - created) / 1000);
                core.setOutput("elapsed_sec", elapsedSec.toString());
                core.setOutput("target_issue", targetIssue);
              } catch (e) {
                console.log("Could not calculate time: " + e.message);
              }
            }

            console.log(`Evaluated new issue #${issueNum} @${author}: ${total}/${baseScore}`);
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner, repo: context.repo.repo,
                workflow_id: "notifications.yml",
                ref: "master",
                inputs: { event: "new_issue", user: author, issue: issueNum.toString(), score: total.toString() }
              });
            } catch (e) { console.log("notify skipped: " + e.message); }

      - name: Commit Ledger
        run: |
          git config user.name "AI Training Bot"
          git config user.email "bot@ai-research.github"
          git add BOUNTY_LEDGER.json
          git diff --cached --quiet || (git commit -m "bounty: update ledger" && git pull --rebase origin master && git push origin master)
