name: Sandbox Verify

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      code:
        required: true
        type: string

jobs:
  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Sandbox
        run: |
          # Create a temporary test environment
          mkdir -p /tmp/sandbox
          cat > /tmp/sandbox/Dockerfile << 'DOCKERFILE'
          FROM python:3.11-slim
          RUN pip install --no-cache-dir flask requests
          WORKDIR /app
          COPY vuln_app.py /app/
          COPY fix_code.py /app/
          CMD ["python", "test_fix.py"]
          DOCKERFILE

      - name: Create Vulnerable App
        run: |
          cat > /tmp/sandbox/vuln_app.py << 'VULN'
          #!/usr/bin/env python3
          """Vulnerable application template - will be specialized per issue"""
          import subprocess
          import os

# Example: Command injection vulnerability
def vulnerable_function(user_input):
    # VULNERABLE: shell injection
    result = subprocess.check_output(f"echo {user_input}", shell=True)
    return result.decode().strip()

# Test: try injection
if __name__ == "__main__":
    # This should fail if fix is correct
    test_input = "hello; cat /etc/passwd"
    try:
        result = vulnerable_function(test_input)
        print(f"VULNERABLE: injection succeeded: {result[:50]}")
        exit(1)
    except Exception as e:
        print(f"SECURE: injection blocked: {e}")
        exit(0)
VULN

      - name: Create Fix Test
        run: |
          cat > /tmp/sandbox/test_fix.py << 'TEST'
#!/usr/bin/env python3
"""Load the fix code and verify it blocks attacks"""
import sys
import importlib.util

# Load the submitted fix
spec = importlib.util.spec_from_file_location("fix_code", "/app/fix_code.py")
fix = importlib.util.module_from_spec(spec)
spec.loader.exec_module(fix)

# Run the fix against known attack vectors
test_cases = [
    ("sql_injection", "' OR '1'='1"),
    ("command_injection", "; rm -rf /"),
    ("xss", "<script>alert(1)</script>"),
    ("path_traversal", "../../etc/passwd"),
]

all_pass = True
for name, payload in test_cases:
    try:
        result = fix.validate(payload)
        if not result:
            print(f"PASS: {name} blocked")
        else:
            print(f"FAIL: {name} allowed: {result}")
            all_pass = False
    except Exception as e:
        print(f"PASS: {name} raised exception: {e}")

sys.exit(0 if all_pass else 1)
TEST

      - name: Write Fix Code
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const code = `${{ inputs.code }}`;
            // Unescape the code
            const decoded = code
              .replace(/\\n/g, "\n")
              .replace(/\\t/g, "\t")
              .replace(/\\"/g, '"');
            fs.writeFileSync("/tmp/sandbox/fix_code.py", decoded);
            console.log("Fix code written to sandbox");

      - name: Build & Run Sandbox
        id: sandbox
        continue-on-error: true
        run: |
          cd /tmp/sandbox
          docker build -t sandbox-test . 2>&1 | tail -5
          docker run --rm --name sandbox-test-run sandbox-test 2>&1
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT

      - name: Report Sandbox Result
        uses: actions/github-script@v7
        with:
          script: |
            const exitCode = parseInt("${{ steps.sandbox.outputs.EXIT_CODE }}");
            const result = exitCode === 0 ? "✅ Sandbox: Fix verified" : "❌ Sandbox: Fix failed";
            console.log(result);

            await github.rest.issues.createComment({
            console.log("💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。感谢贡献！🎉");
              issue_number: parseInt("${{ inputs.pr_number }}"),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Sandbox Verification\n\n${result}\n\n> 💡 虚拟代币仅供学习排名使用`
            });
