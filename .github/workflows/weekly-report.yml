name: Weekly Report

on:
  schedule:
    - cron: "0 8 * * 0"   # 每周日 UTC 08:00 = 北京 16:00
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = new Date();
            const weekAgo = new Date(now.getTime() - 7 * 86400000).toISOString();

            // Count new issues this week
            const { data: newIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: "all", per_page: 100,
              sort: "created", direction: "desc", since: weekAgo
            });
            const created = newIssues.filter(i => !i.pull_request).length;

            // Count merged PRs this week
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: "closed", per_page: 100,
              sort: "updated", direction: "desc"
            });
            const merged = prs.filter(p => p.merged_at && p.merged_at >= weekAgo).length;

            // Unique contributors
            const contributors = new Set();
            for (const p of prs) {
              if (p.merged_at && p.merged_at >= weekAgo) contributors.add(p.user.login);
            }

            // Read ledgers
            let ledger = {};
            try {
              const { data: f } = await github.rest.repos.getContent({ owner, repo, path: "BOUNTY_LEDGER.json" });
              ledger = JSON.parse(Buffer.from(f.content, "base64").toString());
            } catch (e) {}
            const totalBounty = Object.values(ledger).reduce((s, u) => s + (u.total || 0), 0);

            // Read capacity gauge
            let openCount = 0;
            try {
              const { data: issues } = await github.rest.issues.listForRepo({ owner, repo, state: "open", per_page: 1 });
              // This only gets count info
              openCount = (await github.rest.repos.get({ owner, repo })).data.open_issues_count;
            } catch (e) {}

            const weekNum = Math.ceil((now - new Date(now.getFullYear(), 0, 1)) / (7 * 86400000));

            let report = `# 📊 周报 — Week ${weekNum} (${now.toISOString().slice(0, 10)})\n\n`;
            report += `## 📈 本周概览\n\n`;
            report += `| 指标 | 数值 |\n`;
            report += `|:----|:----:|\n`;
            report += `| 🆕 新任务 | ${created} |\n`;
            report += `| ✅ 已合并 PR | ${merged} |\n`;
            report += `| 👥 活跃贡献者 | ${contributors.size} |\n`;
            report += `| 💰 累计发放 | **$${totalBounty}** |\n`;
            report += `| 📂 当前 Open Issues | ${openCount} |\n\n`;

            // Top contributors this week
            report += `## 🏆 本周 Top 贡献者\n\n`;
            report += `| 排名 | 参与者 | 收入 |\n`;
            report += `|:---:|:------:|:----:|\n`;
            const sorted = Object.entries(ledger).sort((a, b) => b[1].total - a[1].total);
            const medals = ["🥇", "🥈", "🥉"];
            for (let i = 0; i < Math.min(sorted.length, 5); i++) {
              report += `| ${medals[i] || `#${i+1}`} | @${sorted[i][0]} | **$${sorted[i][1].total}** |\n`;
            }

            // Recent merged PRs
            const recent = prs.filter(p => p.merged_at && p.merged_at >= weekAgo).slice(0, 5);
            if (recent.length > 0) {
              report += `\n## 🔄 本周合并\n\n`;
              for (const p of recent) {
                report += `- [#${p.number}](${p.html_url}) ${p.title.substring(0, 60)} by @${p.user.login}\n`;
              }
            }

            report += `\n---\n> 💡 虚拟代币仅供学习排名使用，不可兑换为现金或加密货币。下周继续加油！🚀\n`;

            // Create or update weekly report issue
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "weekly-report", per_page: 1
            });

            if (existing.length > 0) {
              await github.rest.issues.update({
                issue_number: existing[0].number, owner, repo,
                title: `📊 周报 Week ${weekNum}`,
                body: report
              });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: `📊 周报 Week ${weekNum}`,
                body: report,
                labels: ["weekly-report"]
              });
            }

            console.log(`Week ${weekNum} report: ${created} issues, ${merged} PRs, ${contributors.size} contributors`);
